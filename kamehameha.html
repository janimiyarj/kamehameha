<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kamehameha App ⚡</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bangers&family=Rajdhani:wght@600&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
  #app { width: 100vw; height: 100vh; position: relative; overflow: hidden; }
  #videoEl { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
  #overlayCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; }

  #ui { position: absolute; top: 0; left: 0; right: 0; z-index: 5; pointer-events: none;
    display: flex; flex-direction: column; align-items: center; padding: 16px; gap: 6px; }
  #status {
    font-family: 'Bangers', cursive; font-size: 28px; letter-spacing: 2px;
    color: #fff; text-shadow: 0 0 10px #44f, 0 2px 0 #000;
    background: rgba(0,0,0,0.45); padding: 4px 20px; border-radius: 30px;
  }
  #barWrap { width: 220px; height: 12px; background: rgba(255,255,255,0.15); border-radius: 6px; overflow: hidden; border: 1px solid rgba(100,150,255,0.3); }
  #barFill { height: 100%; width: 0%; background: linear-gradient(90deg, #2233ff, #00aaff, #ffffff); border-radius: 6px; transition: width 0.1s; }
  #hint { font-family: 'Rajdhani', sans-serif; font-size: 13px; color: rgba(255,255,255,0.5); letter-spacing: 1px; }

  /* Start screen */
  #startScreen {
    position: absolute; inset: 0; z-index: 20;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px;
    background: radial-gradient(ellipse at center, #0a0a2e 0%, #000 70%);
  }
  .logo { font-family: 'Bangers', cursive; font-size: 56px; letter-spacing: 4px;
    color: #fff; text-shadow: 0 0 20px #44f, 0 0 60px #22f, 0 4px 0 #000;
    animation: pulse 2s ease-in-out infinite; }
  .subtitle { font-family: 'Rajdhani', sans-serif; font-size: 15px; letter-spacing: 2px;
    color: rgba(150,180,255,0.8); text-align: center; max-width: 300px; line-height: 1.6; }
  .instructions { display: flex; gap: 24px; margin: 8px 0; }
  .step { font-family: 'Rajdhani', sans-serif; font-size: 13px; color: rgba(200,220,255,0.7);
    text-align: center; display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .step-icon { font-size: 28px; }
  #startBtn {
    font-family: 'Bangers', cursive; font-size: 22px; letter-spacing: 2px;
    background: linear-gradient(135deg, #2233ff, #0099ff);
    color: #fff; border: none; border-radius: 50px; padding: 14px 44px;
    cursor: pointer; box-shadow: 0 0 30px rgba(50,100,255,0.6);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  #startBtn:hover { transform: scale(1.06); box-shadow: 0 0 50px rgba(50,150,255,0.8); }
  #startBtn:active { transform: scale(0.97); }
  #startBtn:disabled { opacity: 0.5; cursor: default; transform: none; }

  /* Aura background when charging */
  #aura { position: absolute; inset: 0; z-index: 1; pointer-events: none; opacity: 0; transition: opacity 0.3s; }

  @keyframes pulse { 0%,100%{text-shadow:0 0 20px #44f,0 0 60px #22f,0 4px 0 #000} 50%{text-shadow:0 0 40px #66f,0 0 100px #44f,0 4px 0 #000} }
</style>
</head>
<body>
<div id="app">
  <video id="videoEl" playsinline autoplay muted></video>
  <canvas id="aura"></canvas>
  <canvas id="overlayCanvas"></canvas>

  <div id="ui">
    <div id="status">SHOW BOTH HANDS</div>
    <div id="barWrap"><div id="barFill"></div></div>
    <div id="hint">BRING HANDS TOGETHER TO CHARGE · THRUST UP TO FIRE</div>
  </div>

  <div id="startScreen">
    <div class="logo">⚡ KAMEHAMEHA</div>
    <div class="subtitle">Use your hands like Goku.<br>Charge your ki. Unleash the beam.</div>
    <div class="instructions">
      <div class="step"><div class="step-icon">🙌</div>Bring hands<br>together</div>
      <div class="step"><div class="step-icon">🔵</div>Watch the<br>orb charge</div>
      <div class="step"><div class="step-icon">⚡</div>Thrust up<br>to FIRE!</div>
    </div>
    <button id="startBtn">▶ START CAMERA</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script>
const videoEl = document.getElementById('videoEl');
const canvas = document.getElementById('overlayCanvas');
const auraCanvas = document.getElementById('aura');
const ctx = canvas.getContext('2d');
const aCtx = auraCanvas.getContext('2d');
const statusEl = document.getElementById('status');
const barFill = document.getElementById('barFill');
const startScreen = document.getElementById('startScreen');
const startBtn = document.getElementById('startBtn');

let power = 0, firing = false, beamProgress = 0;
let chargeParticles = [], beamParticles = [];
let prevWristY = null, thrustCooldown = 0, firingTimer = 0;
let handData = null;
let screenFlash = 0;

function resize() {
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
  auraCanvas.width = window.innerWidth; auraCanvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

function lerp(a, b, t) { return a + (b - a) * t; }
function dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }

startBtn.addEventListener('click', async () => {
  startBtn.textContent = 'Accessing Camera...';
  startBtn.disabled = true;
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } } });
    videoEl.srcObject = stream;
    await videoEl.play();
    startScreen.style.display = 'none';
    statusEl.textContent = 'SHOW BOTH HANDS';
    initHands();
    requestAnimationFrame(loop);
  } catch (e) {
    startBtn.textContent = '▶ START CAMERA';
    startBtn.disabled = false;
    statusEl.textContent = 'CAMERA DENIED — CHECK PERMISSIONS';
  }
});

function initHands() {
  const hands = new Hands({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
  hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.5 });
  hands.onResults(r => { handData = r; });
  const cam = new Camera(videoEl, { onFrame: async () => { await hands.send({ image: videoEl }); }, width: 1280, height: 720 });
  cam.start();
}

function spawnParticle(cx, cy) {
  const angle = Math.random() * Math.PI * 2;
  const r = 50 + Math.random() * 100;
  chargeParticles.push({ x: cx + Math.cos(angle) * r, y: cy + Math.sin(angle) * r, tx: cx, ty: cy, life: 1, speed: 0.035 + Math.random() * 0.045, size: 2 + Math.random() * 3, color: Math.random() < 0.5 ? '100,180,255' : '200,230,255' });
}

function drawAura(power) {
  aCtx.clearRect(0, 0, auraCanvas.width, auraCanvas.height);
  if (power < 0.1) return;
  const W = auraCanvas.width, H = auraCanvas.height;
  const g = aCtx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W, H) * 0.7);
  g.addColorStop(0, `rgba(30,60,200,${0.12 * power})`);
  g.addColorStop(0.5, `rgba(10,20,100,${0.08 * power})`);
  g.addColorStop(1, 'rgba(0,0,0,0)');
  aCtx.fillStyle = g;
  aCtx.fillRect(0, 0, W, H);
  // edge glow
  if (power > 0.5) {
    const edgeG = aCtx.createLinearGradient(0, 0, 0, H);
    edgeG.addColorStop(0, `rgba(50,100,255,${0.15 * (power - 0.5) * 2})`);
    edgeG.addColorStop(0.5, 'rgba(0,0,0,0)');
    edgeG.addColorStop(1, `rgba(50,100,255,${0.15 * (power - 0.5) * 2})`);
    aCtx.fillStyle = edgeG;
    aCtx.fillRect(0, 0, W, H);
  }
}

function drawOrb(cx, cy, pwr) {
  const r = 22 + pwr * 70;
  const pulse = r + Math.sin(Date.now() / 100) * 10 * pwr;
  // outer halo
  const g1 = ctx.createRadialGradient(cx, cy, 0, cx, cy, pulse * 3);
  g1.addColorStop(0, `rgba(80,140,255,${0.2 * pwr})`);
  g1.addColorStop(0.5, `rgba(40,80,200,${0.08 * pwr})`);
  g1.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.beginPath(); ctx.arc(cx, cy, pulse * 3, 0, Math.PI * 2);
  ctx.fillStyle = g1; ctx.fill();
  // core
  const g2 = ctx.createRadialGradient(cx, cy, 0, cx, cy, pulse);
  g2.addColorStop(0, `rgba(240,248,255,${pwr})`);
  g2.addColorStop(0.3, `rgba(100,170,255,${0.95 * pwr})`);
  g2.addColorStop(0.7, `rgba(50,100,220,${0.7 * pwr})`);
  g2.addColorStop(1, 'rgba(20,40,180,0)');
  ctx.beginPath(); ctx.arc(cx, cy, pulse, 0, Math.PI * 2);
  ctx.fillStyle = g2; ctx.fill();
  // electric arcs
  for (let i = 0; i < 6; i++) {
    const a = (Date.now() / 150 + i * Math.PI / 3) % (Math.PI * 2);
    const jx = (Math.random() - 0.5) * 30 * pwr, jy = (Math.random() - 0.5) * 30 * pwr;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.quadraticCurveTo(cx + Math.cos(a) * pulse * 0.5 + jx, cy + Math.sin(a) * pulse * 0.5 + jy,
      cx + Math.cos(a) * pulse * (0.8 + Math.random() * 0.4), cy + Math.sin(a) * pulse * (0.8 + Math.random() * 0.4));
    ctx.strokeStyle = `rgba(180,220,255,${0.5 * pwr})`; ctx.lineWidth = 1 + pwr; ctx.stroke();
  }
}

function drawBeam(cx, cy) {
  const W = canvas.width, H = canvas.height;
  beamProgress = Math.min(1, beamProgress + 0.035);
  const bx = cx + (W - cx) * beamProgress;
  const bh = 45 + Math.sin(Date.now() / 40) * 10;

  // outer glow
  const og = ctx.createLinearGradient(cx, cy, bx, cy);
  og.addColorStop(0, 'rgba(60,120,255,0.3)'); og.addColorStop(1, 'rgba(0,60,255,0.05)');
  ctx.fillStyle = og; ctx.fillRect(cx - 10, cy - bh * 2.5, bx - cx + 10, bh * 5);
  // mid beam
  const mg = ctx.createLinearGradient(cx, cy, bx, cy);
  mg.addColorStop(0, 'rgba(150,210,255,0.9)'); mg.addColorStop(0.3, 'rgba(80,160,255,0.85)'); mg.addColorStop(1, 'rgba(30,100,255,0.2)');
  ctx.fillStyle = mg; ctx.fillRect(cx - 10, cy - bh, bx - cx + 10, bh * 2);
  // core white
  const cg = ctx.createLinearGradient(cx, cy, bx, cy);
  cg.addColorStop(0, 'rgba(255,255,255,1)'); cg.addColorStop(0.15, 'rgba(200,230,255,0.95)'); cg.addColorStop(1, 'rgba(100,180,255,0.4)');
  ctx.fillStyle = cg; ctx.fillRect(cx - 10, cy - bh * 0.35, bx - cx + 10, bh * 0.7);

  // tip explosion
  if (beamProgress < 1) {
    const tg = ctx.createRadialGradient(bx, cy, 0, bx, cy, bh * 1.5);
    tg.addColorStop(0, 'rgba(255,255,255,0.9)');
    tg.addColorStop(0.4, 'rgba(100,180,255,0.7)');
    tg.addColorStop(1, 'rgba(30,80,255,0)');
    ctx.beginPath(); ctx.arc(bx, cy, bh * 1.5, 0, Math.PI * 2);
    ctx.fillStyle = tg; ctx.fill();
  }

  // spark particles
  if (Math.random() < 0.8) {
    beamParticles.push({ x: bx + (Math.random()-0.5)*bh, y: cy + (Math.random()-0.5)*bh, vx: (Math.random()-0.2)*5, vy: (Math.random()-0.5)*6, life: 1, size: 2+Math.random()*5 });
  }
  beamParticles = beamParticles.filter(p => p.life > 0);
  beamParticles.forEach(p => {
    p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.life -= 0.04;
    ctx.beginPath(); ctx.arc(p.x, p.y, Math.max(0, p.size * p.life), 0, Math.PI * 2);
    ctx.fillStyle = `rgba(180,220,255,${p.life})`; ctx.fill();
  });

  // origin flash
  const fg = ctx.createRadialGradient(cx, cy, 0, cx, cy, 100);
  fg.addColorStop(0, `rgba(255,255,255,${0.7 + Math.sin(Date.now()/50)*0.3})`);
  fg.addColorStop(1, 'rgba(100,160,255,0)');
  ctx.beginPath(); ctx.arc(cx, cy, 100, 0, Math.PI * 2);
  ctx.fillStyle = fg; ctx.fill();

  // screen flash
  if (firingTimer > 80) {
    const sf = (firingTimer - 80) / 10;
    ctx.fillStyle = `rgba(200,230,255,${sf * 0.4})`;
    ctx.fillRect(0, 0, W, H);
  }
}

function drawParticles() {
  chargeParticles = chargeParticles.filter(p => p.life > 0);
  chargeParticles.forEach(p => {
    p.x = lerp(p.x, p.tx, p.speed);
    p.y = lerp(p.y, p.ty, p.speed);
    p.life -= 0.012;
    if (Math.hypot(p.x - p.tx, p.y - p.ty) < 6) p.life = 0;
    ctx.beginPath(); ctx.arc(p.x, p.y, Math.max(0, p.size * p.life), 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${p.color},${p.life * 0.85})`; ctx.fill();
  });
}

function loop() {
  requestAnimationFrame(loop);
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const W = canvas.width, H = canvas.height;

  if (!handData || !handData.multiHandLandmarks || handData.multiHandLandmarks.length === 0) {
    statusEl.textContent = 'SHOW BOTH HANDS';
    power = Math.max(0, power - 0.012);
    barFill.style.width = (power * 100) + '%';
    drawAura(power); drawParticles();
    return;
  }

  const lms = handData.multiHandLandmarks;
  const n = lms.length;
  const palms = lms.map(lm => ({ x: (1 - lm[9].x) * W, y: lm[9].y * H }));
  const wrists = lms.map(lm => ({ x: (1 - lm[0].x) * W, y: lm[0].y * H }));
  const cx = palms.reduce((s, p) => s + p.x, 0) / palms.length;
  const cy = palms.reduce((s, p) => s + p.y, 0) / palms.length;

  if (thrustCooldown > 0) thrustCooldown--;

  if (firing) {
    firingTimer--;
    if (firingTimer <= 0) { firing = false; beamProgress = 0; power = 0; beamParticles = []; chargeParticles = []; }
    statusEl.textContent = '⚡ KAMEHAMEHA ⚡';
    drawBeam(cx, cy); drawParticles();
    barFill.style.width = '100%';
    return;
  }

  const handDist = n === 2 ? dist(palms[0], palms[1]) : 999;
  drawAura(power);

  if (n === 2 && handDist < W * 0.3) {
    const rate = lerp(0.004, 0.022, 1 - handDist / (W * 0.3));
    power = Math.min(1, power + rate);
    statusEl.textContent = power > 0.85 ? '🔥 FULLY CHARGED — THRUST UP!' : `⚡ CHARGING... ${Math.round(power * 100)}%`;
    if (Math.random() < 0.6) spawnParticle(cx, cy);
    drawOrb(cx, cy, power);

    if (power > 0.25 && prevWristY !== null && thrustCooldown === 0) {
      const avgY = wrists.reduce((s, w) => s + w.y, 0) / wrists.length;
      if (prevWristY - avgY > H * 0.06) {
        firing = true; firingTimer = 100; thrustCooldown = 150;
      }
    }
    prevWristY = wrists.reduce((s, w) => s + w.y, 0) / wrists.length;
  } else if (n === 2) {
    statusEl.textContent = 'BRING HANDS CLOSER TO CHARGE!';
    power = Math.max(0, power - 0.006);
    if (power > 0.1) drawOrb(cx, cy, power * 0.5);
    prevWristY = null;
  } else {
    statusEl.textContent = n === 1 ? 'USE BOTH HANDS!' : 'SHOW BOTH HANDS!';
    power = Math.max(0, power - 0.012);
    prevWristY = null;
  }

  barFill.style.width = (power * 100) + '%';
  drawParticles();
}
</script>
</body>
</html>
